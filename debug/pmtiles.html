<!DOCTYPE html>
<html>

<head>
    <title>Mapbox GL JS debug page</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../dist/mapbox-gl.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        html,
        body,
        #map {
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script src="../dist/mapbox-gl-dev.js"></script>
    <script type="module">
        import {getAccessToken} from './access_token_generated.js';
        const accessToken = getAccessToken();
        mapboxgl.accessToken = accessToken;

        mapboxgl.addTileProvider('pmtiles', new URL('../packages/pmtiles-provider/dist/mapbox-gl-pmtiles-provider.js', import.meta.url).href);

        const style = await fetch(`https://api.mapbox.com/styles/v1/mapbox/standard-satellite?access_token=${accessToken}`)
            .then(response => response.json())
            .then(style => {
                const baseURL = new URL('../test/integration/tiles', location.href).href;
                style.sources = {
                    'composite': {
                        type: 'vector',
                        url: baseURL + '/streets-v8-z0-z3.pmtiles'
                    },
                    'mapbox-dem': {
                        type: 'raster-dem',
                        tileSize: 256,
                        url: baseURL + '/terrain-dem.pmtiles'
                    },
                    'mapbox://mapbox.satellite': {
                        type: 'raster',
                        tileSize: 256,
                        url: baseURL + '/satellite-z0-z3.pmtiles'
                    },
                };
                return style;
            });

        const map = window.map = new mapboxgl.Map({
            container: 'map',
            zoom: 4,
            center: [-112, 41],
            hash: true,
            style
        });
    </script>
</body>

</html>
