<!DOCTYPE html>
<html>

<head>
    <title>Mapbox GL JS model-state debug page</title>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel='stylesheet' href='../dist/mapbox-gl.css' />
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
        }

        html, body {
            height: 100%;
        }

        #panel {
            width: 220px;
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #ccc;
            padding: 12px;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: sans-serif;
            font-size: 13px;
        }

        #panel h3 {
            margin: 0 0 8px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #555;
        }

        #panel h4 {
            margin: 10px 0 4px;
            font-size: 12px;
            color: #777;
        }

        #panel label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            gap: 6px;
        }

        #panel input[type=range] {
            flex: 1;
        }

        #panel input[type=color] {
            width: 36px;
            height: 24px;
            border: 1px solid #ccc;
            padding: 0;
            cursor: pointer;
        }

        #map {
            flex: 1;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id='panel'>
        <h3>Model State</h3>
        <label>Color <input type="color" id="vehicle-color"></label>
        <label>Trunk <input type="range" id="trunk" min="0" max="1" step="0.01" value="0"></label>
        <label>Hood <input type="range" id="hood" min="0" max="1" step="0.01" value="0"></label>
        <h4>Doors</h4>
        <label>Front Left <input type="range" id="doors-front-left" min="0" max="1" step="0.01" value="0.5"></label>
        <label>Front Right <input type="range" id="doors-front-right" min="0" max="1" step="0.01" value="0"></label>
        <h4>Lights</h4>
        <label>Brake <input type="range" id="brake-lights" min="0" max="1" step="0.01" value="0"></label>
    </div>
    <div id='map'></div>

    <script type="module">
        import * as mapboxgl from '../dist/esm-dev/mapbox-gl.js';
        import {getAccessToken} from './access_token_generated.js';

        const style = {
            "version": 8,
            "metadata": {
                "test": {
                    "width": 512,
                    "height": 512,
                    "allowed": 0.0015,
                    "operations": [
                        ["wait"],
                        [
                            "setFeatureState",
                            {
                                "source": "3d-model-source",
                                "sourceLayer": "",
                                "id": "ego-car"
                            },
                            {
                                "vehicle-color": "rgba(2, 9, 112, 1)",
                                "brake-light-color": "rgba(225, 0, 0, 1)",
                                "brake-light-emission": 0.8,
                                "doors-front-left": [0.0, -45.0, 0.0],
                                "hood": [45.0, 0.0, 0.0],
                                "trunk": [-45.0, 0.0, 0.0]
                            }
                        ],
                        ["wait"]
                    ]
                }
            },
            "glyphs": "mapbox://fonts/mapbox/{fontstack}/{range}.pbf",
            "lights": [
                {
                    "type": "ambient",
                    "id": "environment",
                    "properties": {
                        "intensity": 0.4
                    }
                },
                {
                    "type": "directional",
                    "id": "sun_light",
                    "properties": {
                        "intensity": 0.6,
                        "cast-shadows": true,
                        "shadow-intensity": 1.0
                    }
                }
            ],
            "sources": {
                "3d-model-source": {
                    "type": "model",
                    "models": {
                        "ego-car": {
                            "uri": "/test/integration/models/ego_car.glb",
                            "position": [-74.0135, 40.7153],
                            "orientation": [0, 0, 0],
                            "materialOverrides": [
                                "body",
                                "lights_brakes",
                                "lights-brakes_reverse",
                                "lights_brakes_volume",
                                "lights-brakes_reverse_volume"
                            ],
                            "nodeOverrides": [
                                "doors_front-left",
                                "doors_front-right",
                                "hood",
                                "trunk"
                            ]
                        }
                    }
                },
                "3d-model-source-for-source-based-updates": {
                    "type": "model",
                    "models": {
                        "ego-car": {
                            "uri": "/test/integration/models/ego_car.glb",
                            "position": [-74.0138, 40.7154],
                            "orientation": [0, 0, 0]
                        }
                    }
                },
                "ego-car-labels": {
                    "type": "geojson",
                    "data": {
                        "type": "FeatureCollection",
                        "features": [
                            {
                                "type": "Feature",
                                "properties": {
                                    "name": "Feature state based overrides"
                                },
                                "geometry": {
                                    "type": "Point",
                                    "coordinates": [-74.0135, 40.7153, 2.0]
                                }
                            },
                            {
                                "type": "Feature",
                                "properties": {
                                    "name": "Model source based overrides"
                                },
                                "geometry": {
                                    "type": "Point",
                                    "coordinates": [-74.0138, 40.7154, 2.0]
                                }
                            }
                        ]
                    }
                }
            },
            "pitch": 55,
            "zoom": 19.50,
            //"zoom": 5.50,
            "bearing": 35,
            "center": [
                -74.0135,
                40.7153
            ],
            "camera": {
                "camera-projection": "orthographic"
            },
            "layers": [
                {
                    "id": "background",
                    "type": "background",
                    "paint": {
                        "background-color": "lightgray"
                    }
                },
                {
                    "id": "3d-model-layer-for-source-based-updates",
                    "type": "model",
                    "source": "3d-model-source-for-source-based-updates",
                    "paint": {
                        "model-scale": [10, 10, 10],
                        "model-type": "location-indicator"
                    }
                },
                {
                    "id": "3d-model-layer",
                    "type": "model",
                    "source": "3d-model-source",
                    "paint": {
                        "model-scale": [10, 10, 10],
                        "model-type": "location-indicator",
                        "model-color": [
                            "match",
                            ["get", "part"],
                            "lights_brakes",
                            ["feature-state", "brake-light-color"],
                            "lights-brakes_reverse",
                            ["feature-state", "brake-light-color"],
                             "lights_brakes_volume",
                            ["feature-state", "brake-light-color"],
                            "lights-brakes_reverse_volume",
                            ["feature-state", "brake-light-color"],
                            ["feature-state", "vehicle-color"]
                        ],
                        "model-color-mix-intensity": [
                            "match",
                            ["get", "part"],
                            "body",
                            1.0,
                            "lights_brakes",
                            ["feature-state", "brake-light-emission"],
                            "lights-brakes_reverse",
                            ["feature-state", "brake-light-emission"],
                            "lights_brakes_volume",
                            ["feature-state", "brake-light-emission"],
                            "lights-brakes_reverse_volume",
                            ["feature-state", "brake-light-emission"],
                            0.0
                        ],
                        "model-emissive-strength": [
                            "match",
                            ["get", "part"],
                            "lights_brakes",
                            ["feature-state", "brake-light-emission"],
                            "lights_brakes_volume",
                            ["feature-state", "brake-light-emission"],
                            "lights-brakes_reverse",
                            ["feature-state", "brake-light-emission"],
                             "lights-brakes_reverse_volume",
                            ["feature-state", "brake-light-emission"],
                            0.0
                        ],
                        "model-rotation": [
                            "match",
                            ["get", "part"],
                            "doors_front-left",
                            ["feature-state", "doors-front-left"],
                            "doors_front-right",
                            ["feature-state", "doors-front-right"],
                            "hood",
                            ["feature-state", "hood"],
                            "trunk",
                            ["feature-state", "trunk"],
                            [0.0, 0.0, 0.0]
                        ],
                        "model-opacity": [
                             "match",
                            ["get", "part"],
                            "lights_brakes_volume",
                            ["feature-state", "brake-light-emission"],
                            "lights-brakes_reverse_volume",
                            ["feature-state", "brake-light-emission"],
                            1.0
                        ]
                    }
                },
                {
                    "id": "ego-car-labels",
                    "type": "symbol",
                    "source": "ego-car-labels",
                    "layout": {
                        "text-field": ["get", "name"],
                        "text-font": [
                            "Open Sans Semibold",
                            "Arial Unicode MS Bold"
                        ],
                        "text-size": 16,
                        "text-allow-overlap": true,
                        "text-anchor": "bottom",
                        "text-offset": [0, -10]
                    },
                    "paint": {
                        "text-color": "black",
                        "text-halo-color": "white",
                        "text-halo-width": 2
                    }
                }
            ]
        };

        var map = window.map = new mapboxgl.Map({
            accessToken: getAccessToken(),
            container: 'map',
            devtools: true,
            projection: 'globe',
            style
        });

        const egoCarParams = {
            doorsFrontLeft: 0.5,
            doorsFrontRight: 0,
            trunk: 0,
            hood: 0,
            brakeLights: 0,
            color: { r: 255, g: 255, b: 255, a: 1 }
        };

        function mix(t, a, b) {
            return b * t - a * (t - 1);
        }

        function updateModelState() {
            const doorOpeningDegMax = 80;

            // Method 1: Update feature state
            const egoCarFeatureState =
            {
                "vehicle-color": `rgba(${egoCarParams.color.r}, ${egoCarParams.color.g}, ${egoCarParams.color.b}, 1)`,
                "brake-light-color": "rgba(225, 0, 0, 1)",
                "brake-light-emission": egoCarParams.brakeLights,
                "doors-front-left": [0.0, mix(egoCarParams.doorsFrontLeft, 0, -doorOpeningDegMax), 0.0],
                "doors-front-right": [0.0, mix(egoCarParams.doorsFrontRight, 0, doorOpeningDegMax), 0.0],
                "hood": [mix(egoCarParams.hood, 0, 45), 0.0, 0.0],
                "trunk": [mix(egoCarParams.trunk, 0, -60), 0.0, 0.0]
            };
            map.setFeatureState({ source: '3d-model-source', sourceLayer: '', id: 'ego-car' }, egoCarFeatureState);

            // Method 2: Drive overrides by updating model source directly
            const modelSource = map.getSource("3d-model-source-for-source-based-updates");
            if (modelSource) {
                const modelsSpec = {
                    "ego-car": {
                        "uri": "/test/integration/models/ego_car.glb",
                        "position": [-74.0138, 40.7154],
                        "orientation": [0, 0, 0],
                        "materialOverrides": {
                            "body": {
                                "model-color": [egoCarParams.color.r / 255.0, egoCarParams.color.g / 255.0, egoCarParams.color.b / 255.0],
                                "model-color-mix-intensity": 1.0
                            },
                            "lights_brakes": {
                                "model-color": [0.88, 0.0, 0.0],
                                "model-color-mix-intensity": egoCarParams.brakeLights,
                                "model-emissive-strength": egoCarParams.brakeLights
                            },
                            "lights-brakes_reverse": {
                                "model-color": [0.88, 0.0, 0.0],
                                "model-color-mix-intensity": egoCarParams.brakeLights,
                                "model-emissive-strength": egoCarParams.brakeLights
                            },
                            "lights_brakes_volume": {
                                "model-color": [0.88, 0.0, 0.0],
                                "model-color-mix-intensity": 1.0,
                                "model-emissive-strength": 0.8,
                                "model-opacity": egoCarParams.brakeLights
                            },
                            "lights-brakes_reverse_volume": {
                                "model-color": [0.88, 0.0, 0.0],
                                "model-color-mix-intensity": 1.0,
                                "model-emissive-strength": 0.8,
                                "model-opacity": egoCarParams.brakeLights
                            }
                        },
                        "nodeOverrides": {
                            "doors_front-left": {
                                "orientation": [0.0, mix(egoCarParams.doorsFrontLeft, 0, -doorOpeningDegMax), 0.0]
                            },
                            "doors_front-right": {
                                "orientation": [0.0, mix(egoCarParams.doorsFrontRight, 0, doorOpeningDegMax), 0.0]
                            },
                            "hood": {
                                "orientation": [mix(egoCarParams.hood, 0, 45), 0.0, 0.0]
                            },
                            "trunk": {
                                "orientation": [mix(egoCarParams.trunk, 0, -60), 0.0, 0.0]
                            }
                        }
                    }
                };

                modelSource.setModels(modelsSpec);
            }
        }


        // Setup UI for parameters
        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
        }

        function hexToRgb(hex) {
            const n = parseInt(hex.slice(1), 16);
            return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255, a: 1 };
        }

        const colorInput = document.getElementById('vehicle-color');
        colorInput.value = rgbToHex(egoCarParams.color.r, egoCarParams.color.g, egoCarParams.color.b);
        colorInput.addEventListener('input', () => {
            egoCarParams.color = hexToRgb(colorInput.value);
            updateModelState();
        });

        [
            ['trunk',            'trunk'],
            ['hood',             'hood'],
            ['doors-front-left', 'doorsFrontLeft'],
            ['doors-front-right','doorsFrontRight'],
            ['brake-lights',     'brakeLights'],
        ].forEach(([id, key]) => {
            const el = document.getElementById(id);
            el.value = egoCarParams[key];
            el.addEventListener('input', () => {
                egoCarParams[key] = parseFloat(el.value);
                updateModelState();
            });
        });

        console.time('load');


        map.on('load', () => {

            updateModelState();

            console.timeEnd('load');
        });

    </script>
</body>

</html>
