<!DOCTYPE html>
<html>
<head>
    <title>Mapbox GL JS debug page</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
</head>

<body>

<iframe width="800" height="600"></iframe>
<script type="module">
import {getAccessToken} from './access_token_generated.js';

const js = document.createElement("a");
js.href = "../dist/esm-dev/mapbox-gl.js";
const css = document.createElement("a");
css.href = "../dist/mapbox-gl.css";
document.querySelector('iframe').src = URL.createObjectURL(new Blob([ `
<!DOCTYPE html>
<html>
<head>
    <title>Mapbox GL JS debug page<\/title>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="${css.href}" />
    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>

<body>
<div id="map"></div>
<script type="module">
import * as mapboxgl from '${js.href}';
var map = window.map = new mapboxgl.Map({
    accessToken: "${getAccessToken()}",
    container: 'map',
    devtools: true,
    zoom: 12.5,
    center: [-77.01866, 38.888],
    style: 'mapbox://styles/mapbox/streets-v10',
    hash: true
});

<\/script>
</body>
</html>
` ], {type: 'text/html'}));
</script>

</body>
</html>
